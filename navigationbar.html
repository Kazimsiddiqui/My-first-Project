<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unlock&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>
    <style>
        .ful{
            list-style-type: none;
            margin:10px;
            padding:15px;
            overflow: hidden;
            background-color: burlywood;
        }
        .sul{
            background-color: darkmagenta;
            list-style-type: none;
            padding: 15px;
            margin: 10px;
            overflow: hidden;
            border-radius: 10px;
        }
        .fl{
            float: left;
        }
        .fl a{
            display: block;
            color: white;
            background-color: grey;
            text-align: center;
            padding: 19px;    
            padding-left: 126px;
            padding-right: 126px;
            text-decoration: none;
        }
        .sl a{
            display: block;
            color: lightblue;
            background-color:lightcoral;
            text-align: center;
            padding: 10px;
            padding-left: 90px;
            padding-right:90px;
            margin: 5px;
            text-decoration: none;
            border-radius: 10px;
        }
        .sl a:hover{
            background-color: black;    
            text-shadow: 0px 0px 9px red, 5px 5px 9px yellow;
            border-radius: 25px;
        }
        .fl a:hover{
            background-color: #111;
        }
        h1{
            text-shadow: 2px 2px 4px burlywood;
            font-family: "Unlock","sans-serif";
        }
        .sl{
            float: left;
        }

    </style>
</head>
<body>
    <h1>Navigation Bar</h1>
    <ul class="ful">
        <li class="fl"><a href="#home">Home</a></li>
        <li class="fl"><a href="#news">News</a></li>
        <li class="fl"><a href="#contact">Contact</a></li>
        <li class="fl"><a href="#about">About Us</a></li>
    </ul>

    <ul class="sul">
        <li class="sl"><a href="#">Home</a></li>
        <li class="sl"><a href="#">Sign in</a></li>
        <li class="sl"><a href="#">Login</a></li>
        <li class="sl"><a href="#">About Us</a></li>
        <li class="sl"><a href="#">Contact Us</a></li>
    </ul>
</body>
</html>
